name: Windows Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    env:
      PREPARE_PATH: "Telegram/build/prepare/prepare.py"

    defaults:
      run:
        shell: cmd

    steps:
      - name: Prepare directories.
        run: |
          mkdir %userprofile%\TBuild\Libraries
          mklink /d %GITHUB_WORKSPACE%\TBuild %userprofile%\TBuild
          echo TBUILD=%GITHUB_WORKSPACE%\TBuild>>%GITHUB_ENV%
          echo LibrariesPath=%GITHUB_WORKSPACE%\TBuild\Libraries\win64>>%GITHUB_ENV%

      - name: Get repository name.
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Clone.
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: ${{ env.TBUILD }}/${{ env.REPO_NAME }}

      - name: First set up.
        shell: bash
        run: |
          SDK="10.0.26100.0"
          echo "SDK=$SDK" >> $GITHUB_ENV

          sed -i '/CMAKE_${lang}_FLAGS_DEBUG_INIT/s/${_Zi}//' "$PROGRAMFILES"/CMake/share/cmake*/Modules/Platform/Windows-MSVC.cmake

          echo "$(sha256sum $TBUILD/$REPO_NAME/$PREPARE_PATH | awk '{ print $1 }')" >> CACHE_KEY.txt
          echo "$SDK" >> CACHE_KEY.txt
          echo "CACHE_KEY=$(sha256sum CACHE_KEY.txt | awk '{ print $1 }')" >> $GITHUB_ENV

          git config --global user.email "you@example.com"
          git config --global user.name "Builder"

      - uses: ilammy/msvc-dev-cmd@v1.13.0
        name: Native Tools Command Prompt.
        with:
          arch: x64
          sdk: ${{ env.SDK }}

      - name: NuGet sources.
        run: |
          nuget sources Disable -Name "Microsoft Visual Studio Offline Packages"
          nuget sources Add -Source https://api.nuget.org/v3/index.json & exit 0

      - name: ThirdParty cache.
        id: cache-third-party
        uses: actions/cache@v4
        with:
          path: ${{ env.TBUILD }}/ThirdParty
          key: ${{ runner.OS }}-${{ runner.arch }}-third-party-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ runner.arch }}-third-party-

      - name: Libraries cache.
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LibrariesPath }}/*
            !${{ env.LibrariesPath }}/cache_keys
            !${{ env.LibrariesPath }}/[qQ]t[_-]*
            ${{ env.LibrariesPath }}/cache_keys/*
            !${{ env.LibrariesPath }}/cache_keys/[qQ]t[_-]*
          key: ${{ runner.OS }}-x64-libs-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64-libs-

      - name: Qt cache.
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LibrariesPath }}/[qQ]t[_-]*
            ${{ env.LibrariesPath }}/cache_keys/[qQ]t[_-]*
          key: ${{ runner.OS }}-x64-qt6-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64-qt6-

      - name: Libraries.
        env:
          GYP_MSVS_OVERRIDE_PATH: 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\'
          GYP_MSVS_VERSION: 2022
        run: |
          %TBUILD%\%REPO_NAME%\Telegram\build\prepare\win.bat skip-release silent qt6

      - name: Free up disk space.
        shell: bash
        run: |
          find $LibrariesPath '(' '(' ! '(' \
            -name '*.lib' -o -name '*.a' -o -name '*.exe' \
            -o -name '*.h' -o -name '*.hpp' -o -name '*.inc' \
            -o -name '*.cmake' -o -path '*/include/*' \
            -o -path '*/objects-*' -o -path '*/cache_keys/*' \
            -o -path '*/patches/*' \
            ')' -type f ')' -o -empty ')' -delete

      - name: Build Telegram Desktop.
        run: |
          cd %TBUILD%\%REPO_NAME%\Telegram

          call configure.bat ^
          x64 ^
          qt6 ^
          -D TDESKTOP_API_ID=2040 ^
          -D TDESKTOP_API_HASH=b18441a1ff607e10a989891a5462e627 ^
          -D CMAKE_CONFIGURATION_TYPES=Release ^
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=OFF ^
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=OFF

          cmake --build ..\out --config Release --parallel

      - name: Move artifact.
        run: |
          set OUT=%TBUILD%\%REPO_NAME%\out\Release
          mkdir artifact
          move %OUT%\Telegram.exe artifact\
          move %OUT%\Updater.exe artifact\

      - name: Upload artifact.
        uses: actions/upload-artifact@v4
        with:
          name: NagramX-Windows-x64
          path: artifact\
